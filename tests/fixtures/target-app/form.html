<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Target App - Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>QA Target App</h1>
    <nav>
      <a href="index.html" data-testid="nav-home">Home</a>
      <a href="about.html" data-testid="nav-about">About</a>
      <a href="form.html" data-testid="nav-form">Form</a>
    </nav>
  </header>
  
  <main>
    <h2>Test Form</h2>
    <p>Fill out this form to test input recording, select interactions, and assertions.</p>
    
    <div id="success-msg" class="success-message hidden" data-testid="msg-success">
      Form submitted successfully!
    </div>
    
    <form id="test-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" data-testid="input-name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" data-testid="input-email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password (Should be masked)</label>
        <input type="password" id="password" data-testid="input-password" required>
      </div>
      
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" data-testid="select-role">
          <option value="user">Standard User</option>
          <option value="admin">Administrator</option>
          <option value="qa">QA Engineer</option>
        </select>
      </div>
      
      <div class="form-group checkbox-group">
        <input type="checkbox" id="terms" data-testid="checkbox-terms" required>
        <label for="terms">I accept the terms and conditions</label>
      </div>
      
      <button type="submit" data-testid="btn-submit">Submit Form</button>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
